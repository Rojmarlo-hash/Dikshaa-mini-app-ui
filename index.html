<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#eef3f9">
  <title>Dikshaa Mini App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>
  <div class="ambient ambient-three"></div>

  <main class="app-shell">
    <header class="topbar">
      <div class="bot-orb">
        <span>🤖</span>
      </div>
      <div class="title-block">
        <p>SYSTEM MANAGEMENT</p>
        <h1>Dikshaa Bot Control Panel</h1>
        <span>41 administrative controls unlocked</span>
      </div>
      <button id="themeBtn" class="theme-toggle" type="button" aria-label="Toggle dark mode">
        <span class="toggle-sky"></span>
        <span class="toggle-stars"></span>
        <span class="toggle-moon">🌙</span>
        <span class="toggle-sun">☀️</span>
        <span class="toggle-knob"></span>
      </button>
    </header>

    <section class="status-strip">
      <div>
        <span>Total</span>
        <strong>41</strong>
      </div>
      <div>
        <span>Sections</span>
        <strong>6</strong>
      </div>
      <div>
        <span>Theme</span>
        <strong id="themeText">Light</strong>
      </div>
    </section>

    <section id="adminPanel" class="mini-panel" aria-label="Dikshaa mini app admin panel"></section>
    <section id="detailPanel" class="detail-panel is-hidden" aria-live="polite"></section>
    <section id="commandRoot" class="command-root" aria-label="Dikshaa command list"></section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="app.js"></script>
</body>
</html>
